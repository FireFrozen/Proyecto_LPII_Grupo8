<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Restaurante | Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f5f6fa;
        }

        .dashboard-container {
            padding: 30px;
        }

        .welcome-card {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 15px;
            color: white;
        }

        .welcome-card h2 {
            font-weight: 700;
        }

        .info-card {
            border: none;
            border-radius: 15px;
            transition: all .3s ease;
        }

        .info-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15);
        }

        .role-badge {
            font-size: .95rem;
            padding: 8px 15px;
        }

    </style>

</head>

<body>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}">
    </div>

    <div class="flex-grow-1">

        <div th:replace="~{fragments/navbar :: navbar}">
        </div>

        <div class="container-fluid dashboard-container">

            <div class="card shadow welcome-card mb-4">

                <div class="card-body">

                    <h2>
                        Bienvenido,
                        <span th:text="${session.usuario.nombres}"></span>
                    </h2>

                    <p class="mb-0">
                        Sistema de Gestión del Restaurante
                    </p>

                </div>

            </div>

            <div class="card shadow-sm info-card">

                <div class="card-body">

                    <h4 class="mb-3">
                        Dashboard
                    </h4>

                    <p class="mb-3">
                        Bienvenido al sistema,
                        <strong th:text="${session.usuario.nombres}"></strong>
                    </p>

                    <p>
                        Logueado como:
                        <span class="badge bg-primary role-badge"
                              th:text="${session.usuario.rol.nombre}">
                        </span>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

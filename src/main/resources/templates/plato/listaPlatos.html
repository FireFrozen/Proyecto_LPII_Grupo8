<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Platos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
	<div class="card shadow">
		<div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
			<h3 class="mb-0">Listado de Platos</h3>
			<button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#modalPlato"
					onclick="limpiarModal()">+ Registrar Nuevo Plato</button>
		</div>
		<div class="card-body">
			<div class="alert alert-info" role="alert">
				<span th:text="${mensaje}"></span>
			</div>
			<table class="table table-bordered table-hover table-striped">
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Nombre</th>
						<th>Descripción</th>
						<th>Precio</th>
						<th>Stock</th>
						<th>Categoría</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="p:${platos}">
						<td th:text="${p.idPlato}"></td>
						<td th:text="${p.nombre}"></td>
						<td th:text="${p.descripcion}"></td>
						<td th:text="${p.precio}"></td>
						<td th:text="${p.stock}"></td>
						<td th:text="${p.categoria.nombre}"></td>
						<td>
							<span class="badge bg-success" th:text="${p.estadoRegistro}"></span>
						</td>
						<td>
							<button class="btn btn-warning btn-sm" title="Editar"
									th:onclick="'editarPlato(' + ${p.idPlato} + ')'">&#9998;</button>
							<a class="btn btn-danger btn-sm" title="Eliminar"
							   th:href="@{/gestionplato/eliminar/{id}(id=${p.idPlato})}"
							   onclick="return confirm('¿Eliminar este plato?')">&#128465;</a>
						</td>
					</tr>
				</tbody>
			</table>
			<div class="text-end">
				<strong>
					Total de Platos:
					<span th:text="${#lists.size(platos)}"></span>
				</strong>
			</div>
		</div>
	</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalPlato" tabindex="-1">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header bg-primary text-white">
				<h5 class="modal-title" id="modalTitulo">Nuevo Plato</h5>
				<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
			</div>
			<form th:action="@{/gestionplato/guardar}" method="post">
				<div class="modal-body">
					<input type="hidden" name="idPlato" id="idPlato">
					<div class="mb-3">
						<label class="form-label">Nombre</label>
						<input type="text" class="form-control" name="nombre" id="nombre" required>
					</div>
					<div class="mb-3">
						<label class="form-label">Descripción</label>
						<textarea class="form-control" name="descripcion" id="descripcion" rows="2"></textarea>
					</div>
					<div class="row mb-3">
						<div class="col">
							<label class="form-label">Precio</label>
							<input type="number" step="0.01" class="form-control" name="precio" id="precio" required>
						</div>
						<div class="col">
							<label class="form-label">Stock</label>
							<input type="number" class="form-control" name="stock" id="stock" required>
						</div>
					</div>
					<div class="mb-3">
						<label class="form-label">Categoría</label>
						<select class="form-select" name="categoria.idCategoria" id="categoria" required>
							<option value="">-- Seleccione --</option>
							<option th:each="cat:${categorias}" th:value="${cat.idCategoria}" th:text="${cat.nombre}"></option>
						</select>
					</div>
				</div>
				<div class="modal-footer">
					<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
					<button type="submit" class="btn btn-primary">Guardar</button>
				</div>
			</form>
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
function limpiarModal(){
	$('#idPlato').val('');
	$('#nombre').val('');
	$('#descripcion').val('');
	$('#precio').val('');
	$('#stock').val('');
	$('#categoria').val('');
	$('#modalTitulo').text('Nuevo Plato');
}

function editarPlato(id){
	$.get('/gestionplato/cargar/' + id, function(data){
		$('#idPlato').val(data.idPlato);
		$('#nombre').val(data.nombre);
		$('#descripcion').val(data.descripcion);
		$('#precio').val(data.precio);
		$('#stock').val(data.stock);
		$('#categoria').val(data.categoria.idCategoria);
		$('#modalTitulo').text('Editar Plato');
		$('#modalPlato').modal('show');
	});
}
</script>
</body>
</html>

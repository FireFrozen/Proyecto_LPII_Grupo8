<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Detalle del Pedido</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="d-flex">

	<div th:replace="~{fragments/sidebar :: sidebar}">
	</div>

	<div class="flex-grow-1">

		<div th:replace="~{fragments/navbar :: navbar}">
		</div>

		<div class="container-fluid p-4">

			<a class="btn btn-success mb-3" th:href="@{/gestionpedido/lista}">
				<i class="bi bi-arrow-left-circle"></i> Volver
			</a>

			<div class="card shadow mb-4">
				<div class="card-header bg-primary text-white">
					<h4 class="mb-0">
						<i class="bi bi-receipt"></i>
						Detalle del Pedido #<span th:text="${pedido.idPedido}"></span>
					</h4>
				</div>

				<div class="card-body">
					<div class="row g-3">
						<div class="col-md-4">
							<strong>Fecha y hora</strong>
							<p class="mb-0" th:text="${#temporals.format(pedido.fechaHora, 'dd/MM/yyyy HH:mm')}"></p>
						</div>

						<div class="col-md-4">
							<strong>Mesa</strong>
							<p class="mb-0" th:text="'Mesa N° ' + ${pedido.mesa.numeroMesa}"></p>
						</div>

						<div class="col-md-4">
							<strong>Estado</strong>
							<p class="mb-0">
								<span class="badge bg-success" th:text="${pedido.estadoPedido}"></span>
							</p>
						</div>

						<div class="col-md-4">
							<strong>Cliente</strong>
							<p class="mb-0"
							   th:text="${pedido.cliente.nombres + ' ' + pedido.cliente.apellidos}"></p>
						</div>

						<div class="col-md-4">
							<strong>Mesero</strong>
							<p class="mb-0"
							   th:text="${pedido.usuario.nombres + ' ' + pedido.usuario.apellidos}"></p>
						</div>

						<div class="col-md-4">
							<strong>Total</strong>
							<p class="mb-0"
							   th:text="'S/ ' + ${#numbers.formatDecimal(pedido.total, 1, 2)}"></p>
						</div>
					</div>
				</div>
			</div>

			<div class="card shadow">
				<div class="card-header bg-secondary text-white">
					<h5 class="mb-0">Platos del pedido</h5>
				</div>

				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-bordered table-hover table-striped mb-0">
							<thead class="table-dark">
								<tr>
									<th>Cantidad</th>
									<th>Plato</th>
									<th>Precio unitario</th>
									<th>Subtotal</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="detalle : ${pedido.listaDetalles}">
									<td th:text="${detalle.cantidad}"></td>
									<td th:text="${detalle.plato.nombre}"></td>
									<td th:text="'S/ ' + ${#numbers.formatDecimal(detalle.precioUnitario, 1, 2)}"></td>
									<td th:text="'S/ ' + ${#numbers.formatDecimal(detalle.subtotal, 1, 2)}"></td>
								</tr>

								<tr th:if="${#lists.isEmpty(pedido.listaDetalles)}">
									<td colspan="4" class="text-center text-muted">
										Este pedido no tiene platos registrados.
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

		</div>

	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

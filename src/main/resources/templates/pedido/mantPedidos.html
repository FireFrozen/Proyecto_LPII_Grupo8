<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Pedidos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>

<div class="d-flex">

	<div th:replace="~{fragments/sidebar :: sidebar}">
	</div>

	<div class="flex-grow-1">

		<div th:replace="~{fragments/navbar :: navbar}">
		</div>

<div class="container mt-4">

	<div class="card shadow">

		<div class="card-header bg-primary text-white">
			<h3 class="mb-0">Mantenimiento de Pedidos</h3>
		</div>

		<div class="card-body">

			<div class="alert alert-info" role="alert">
				<span th:text="${mensaje}"></span>
			</div>

			<div class="alert alert-success" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>

			<div class="alert alert-danger" th:if="${mensajeError}" th:text="${mensajeError}"></div>
			
			<a class="btn btn-success mb-3" th:href="@{/gestionpedido/nuevo}">
               <i class="bi bi-plus-circle"></i> Nuevo Pedido
            </a>

			<table class="table table-bordered table-hover table-striped">

				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Fecha y Hora</th>
						<th>Total (S/.)</th>
						<th>N° Mesa</th>
						<th>Cliente</th>
						<th>Mesero</th>
						<th>Estado</th>
						<th>Detalles</th>
						<th>Acciones</th>
					</tr>
				</thead>

				<tbody>

					<tr th:each="p:${pedidos}">

						<td th:text="${p.idPedido}"></td>
						
						<td th:text="${#temporals.format(p.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
						
						<td th:text="${p.total}"></td>
						
						<td th:text="${p.mesa.numeroMesa}"></td>
						
						<td th:text="${p.cliente.nombres + ' ' + p.cliente.apellidos}"></td>
					
						<td th:text="${p.usuario.nombres + ' ' + p.usuario.apellidos}"></td>

						<td>
						<span class="badge bg-success"
							 th:text="${p.estadoPedido}">
						</span>
						</td>
						<td>

							<a class="btn btn-info btn-sm"
							   th:href="@{/gestionpedido/detalle/{id}(id=${p.idPedido})}"
							   title="Ver detalles del pedido">
								<i class="bi bi-info-circle"></i>
							</a>


						</td>
						<td>

							<button type="button"
									class="btn btn-warning btn-sm btnCambiarEstado"
									th:data-id="${p.idPedido}"
									th:data-estado="${p.estadoPedido}"
									data-bs-toggle="modal"
									data-bs-target="#modalEstadoPedido">
								<i class="bi bi-pencil"></i> Cambiar Estado
							</button>

						</td>

					</tr>

				</tbody>

			</table>

			<div class="text-end">

				<strong>
					Total de Pedidos:
					<span th:text="${#lists.size(pedidos)}"></span>
				</strong>
			</div>
		</div>
	</div>
</div>

	</div>

</div>

<div class="modal fade" id="modalEstadoPedido" tabindex="-1" aria-labelledby="tituloModalEstado" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content">

			<form th:action="@{/gestionpedido/actualizar-estado}" method="post">
				<input type="hidden" id="idPedidoEstado" name="idPedido">

				<div class="modal-header">
					<h5 class="modal-title">
						Cambiar Estado del Pedido #<span id="pedidoIdModal"></span>
					</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
				</div>

				<div class="modal-body">
					<div class="mb-3">
						<label for="estadoPedidoModal" class="form-label">Estado</label>
						<select id="estadoPedidoModal" name="estadoPedido" class="form-select" required>
							<option value="PENDIENTE">PENDIENTE</option>
							<option value="EN_PREPARACION">EN_PREPARACION</option>
							<option value="ENTREGADO">ENTREGADO</option>
							<option value="PAGADO">PAGADO</option>
							<option value="ANULADO">ANULADO</option>
						</select>
					</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
					<button type="submit" class="btn btn-primary">Actualizar</button>
				</div>
			</form>

		</div>
	</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
	$(document).on("click", ".btnCambiarEstado", function () {
		$("#idPedidoEstado").val($(this).data("id"));
		$("#pedidoIdModal").text($(this).data("id"));
		$("#estadoPedidoModal").val($(this).data("estado"));
	});
</script>

</body>
</html>

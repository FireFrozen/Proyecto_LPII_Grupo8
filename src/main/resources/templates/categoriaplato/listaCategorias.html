<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Roles</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="d-flex">

	<div th:replace="~{fragments/sidebar :: sidebar}">
	</div>

	<div class="flex-grow-1">

		<div th:replace="~{fragments/navbar :: navbar}">
		</div>

<div class="container mt-4">

	<div class="card shadow">

		<div class="card-header bg-primary text-white">
			<h3 class="mb-0">Listado de Categorias de Platos</h3>
		</div>

		<div class="card-body">

			<div class="alert alert-info" role="alert">
				<span th:text="${mensaje}"></span>
			</div>

			<table class="table table-bordered table-hover table-striped">

				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Nombre</th>
						<th>Descripción</th>
						<th>Estado</th>
					</tr>
				</thead>

				<tbody>

					<tr th:each="c:${categorias}">

						<td th:text="${c.idCategoria}"></td>

						<td th:text="${c.nombre}"></td>
						
						<td th:text="${c.descripcion}"></td>

						<td>
						<span class="badge bg-success"
							 th:text="${c.estadoRegistro}">
						</span>
						</td>

					</tr>

				</tbody>

			</table>

			<div class="text-end">

				<strong>
					Total de Categorias de Platos:
					<span th:text="${#lists.size(categorias)}"></span>
				</strong>
			</div>
		</div>
	</div>
</div>

	</div>

</div>
</body>
</html>
